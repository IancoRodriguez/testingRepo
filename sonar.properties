# Configuración obligatoria
sonar.projectKey=your-organization_sonar-demo
sonar.organization=your-organization

# Esto es la clave y la organización que deberás reemplazar con tus propias credenciales en SonarCloud

# Ruta relativa a los archivos fuente
sonar.sources=.

# Excluye archivos que no deseas analizar
sonar.exclusions=.github/**

# Encoding del código fuente
sonar.sourceEncoding=UTF-8

# Configuración adicional para JavaScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info
